services:
  llm:
    image: lmsysorg/sglang:latest
    container_name: k8s-bench-llm
    ipc: host
    shm_size: 32g
    gpus: all
    networks:
      - k8s-bench-llm
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model-path
      - Qwen/Qwen3.6-27B-FP8
      - --served-model-name
      - Qwen/Qwen3.6-27B-FP8
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --api-key
      - ${LOCAL_LLM_API_KEY:?LOCAL_LLM_API_KEY is required}
      - --tp
      - ${LOCAL_LLM_TP:-2}
      - --disable-custom-all-reduce
      - --context-length
      - "65536"
      - --mem-fraction-static
      - "0.82"
      - --tool-call-parser
      - qwen3_coder

  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.local_llm_proxy
    image: k8s-bench-local-llm-proxy
    container_name: k8s-bench-proxy
    depends_on:
      - llm
    networks:
      - k8s-bench-local
      - k8s-bench-llm
    ports:
      - 127.0.0.1:8002:8002
    command:
      - --upstream
      - http://k8s-bench-llm:8001/v1
      - --host
      - 0.0.0.0
      - --port
      - "8002"

networks:
  k8s-bench-local:
    name: k8s-bench-local
    internal: true
  k8s-bench-llm:
    name: k8s-bench-llm
